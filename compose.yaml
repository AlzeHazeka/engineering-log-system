services:
    laravel.test:
        image: sail-8.4/app
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "${APP_PORT:-8000}:80"
            - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        environment:
            WWWUSER: "${WWWUSER}"
            LARAVEL_SAIL: 1
        volumes:
            - ".:/var/www/html"
        networks:
            - sail
        depends_on:
            - mysql

    mysql:
        image: mysql:8.4
        ports:
            - "${FORWARD_DB_PORT:-3307}:3306"
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
            MYSQL_USER: "${DB_USERNAME:-sail}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-password}"
        volumes:
            - "sail-mysql:/var/lib/mysql"
        networks:
            - sail

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - "${PHPMYADMIN_PORT:-8081}:80"
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: ${DB_USERNAME}
            PMA_PASSWORD: ${DB_PASSWORD}
            PMA_ARBITRARY: 0
        depends_on:
            - mysql
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
