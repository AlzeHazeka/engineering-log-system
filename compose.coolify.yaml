version: "3.8"

services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      - mysql
    networks:
      - coolify
    labels:
      - traefik.enable=true

      - traefik.http.routers.logapp.rule=Host(`log.atsiriwellforce.com`)
      - traefik.http.routers.logapp.entrypoints=http,https
      - traefik.http.routers.logapp.tls=true
      - traefik.http.routers.logapp.tls.certresolver=letsencrypt

      - traefik.http.services.logapp.loadbalancer.server.port=8000

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - coolify

volumes:
  mysql-data:

networks:
  coolify:
    external: true
