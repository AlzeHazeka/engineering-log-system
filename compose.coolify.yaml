version: "3.8"

services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    ports:
      - "8081:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      - mysql
    labels:
      - traefik.enable=true
      - traefik.http.routers.laravel.rule=Host(`log.atsiriwellforce.com`)
      - traefik.http.routers.laravel.entrypoints=http,https
      - traefik.http.routers.laravel.tls.certresolver=letsencrypt
      - traefik.http.services.laravel.loadbalancer.server.port=8000

  mysql:
    image: mysql:8.4
    container_name: laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
